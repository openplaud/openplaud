name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to generate release notes for (e.g. v0.1.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "current=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "current=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Find previous tag
        id: prev
        run: |
          PREV=$(git tag --sort=-creatordate | grep -E '^v' | sed -n '2p')
          if [ -z "$PREV" ]; then
            # First release — use initial commit
            PREV=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        uses: github/copilot-release-notes@main
        with:
          base-ref: ${{ steps.prev.outputs.tag }}
          head-ref: ${{ steps.tag.outputs.current }}
          model: gpt-4.1
          instructions: .github/release-notes-instructions.md
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      # softprops/action-gh-release renames hidden files (e.g. `.env.example`)
      # by prefixing them with `default.` on upload, which breaks predictable
      # download URLs. Copy to a non-hidden name so the asset is uploaded as
      # `env.example` and stays curl-friendly.
      - name: Prepare install artifacts
        run: cp .env.example env.example

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.current }}
          name: ${{ steps.tag.outputs.current }}
          body: ${{ steps.notes.outputs.release-notes }}
          draft: true
          # Attach self-host install artifacts so users can
          #   curl -fLO .../releases/latest/download/docker-compose.yml
          #   curl -fL  .../releases/latest/download/env.example -o .env
          # without cloning the repo.
          files: |
            docker-compose.yml
            env.example
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
