version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: openplaud_postgres
    environment:
      POSTGRES_USER: openplaud
      POSTGRES_PASSWORD: openplaud_password
      POSTGRES_DB: openplaud_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openplaud"]
      interval: 10s
      timeout: 5s
      retries: 5

  openplaud:
    build: .
    container_name: openplaud_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://openplaud:openplaud_password@postgres:5432/openplaud_db
      API_HOST: 0.0.0.0
      API_PORT: 8000
      STREAMLIT_HOST: 0.0.0.0
      STREAMLIT_PORT: 8501
      SECRET_KEY: your-secret-key-here-min-32-chars
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /data/recordings
    volumes:
      - ./data:/data
      - ./logs:/logs
    ports:
      - "8000:8000"  # FastAPI
      - "8501:8501"  # Streamlit
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:

networks:
  default:
    name: openplaud_network
